<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MBA - Matrix Blitz Arena</title>
    <style>
        body { font-family: sans-serif; background: #e0ece4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .game-card { background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); width: 360px; text-align: center; }
        .stats-bar { display: flex; justify-content: space-between; font-weight: bold; background: #f7f9f9; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        .matrix-box { font-size: 24px; font-weight: bold; margin: 20px 0; display: inline-block; padding: 15px 25px; border-left: 4px solid #333; border-right: 4px solid #333; }
        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input[type="number"] { width: 80%; padding: 10px; font-size: 18px; text-align: center; margin-bottom: 15px; }
        button { width: 85%; padding: 12px; background: #27ae60; color: white; border: none; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        #pesan_status { font-weight: bold; margin-top: 15px; min-height: 24px; color: #e67e22; }
    </style>
</head>
<body>

<div class="game-card">
    <h2>MATRIX BLITZ ARENA</h2>
    <div class="stats-bar">
        <div>LEVEL: <span id="level">1</span></div>
        <div>SKOR: <span id="skor">0</span></div>
        <div>WAKTU: <span id="waktu">15</span>s</div>
    </div>

    <div class="matrix-box">
        <div class="matrix-grid">
            <span id="a">0</span> <span id="b">0</span>
            <span id="c">0</span> <span id="d">0</span>
        </div>
    </div>

    <br>
    <input type="number" id="input_user" placeholder="Nilai Determinan" autofocus>
    <br>
    <button onclick="cekJawaban()">ENTER</button>

    <div id="pesan_status"></div>
</div>

<script>
    let skor = 0, level = 1, waktu = 15, timerInterval, a, b, c, d;

    function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function buatSoal() {
        clearInterval(timerInterval);
        waktu = 15;
        document.getElementById("waktu").innerText = waktu;
        document.getElementById("input_user").value = "";

        if (level === 1) {
            a = randomInt(1, 5); b = randomInt(1, 5);
            c = randomInt(1, 5); d = randomInt(1, 5);
        } else if (level === 2) {
            a = randomInt(1, 10); b = randomInt(1, 10);
            c = randomInt(1, 10); d = randomInt(1, 10);
        } else {
            a = randomInt(-5, 5); b = randomInt(-5, 5);
            c = randomInt(-5, 5); d = randomInt(-5, 5);
        }

        document.getElementById("a").innerText = a; document.getElementById("b").innerText = b;
        document.getElementById("c").innerText = c; document.getElementById("d").innerText = d;
        document.getElementById("level").innerText = level;

        timerInterval = setInterval(jalankanTimer, 1000);
    }

    function jalankanTimer() {
        waktu--;
        document.getElementById("waktu").innerText = waktu;
        if (waktu <= 0) {
            clearInterval(timerInterval);
            document.getElementById("pesan_status").innerText = "TIME OUT! Lanjut ke level berikutnya.";
            lanjutLevel();
        }
    }

    function cekJawaban() {
        let inputUser = document.getElementById("input_user").value;
        if (inputUser === "") return;

        let detBenar = (a * d) - (b * c);
        if (parseInt(inputUser) === detBenar) {
            skor += 100;
            document.getElementById("skor").innerText = skor;
            document.getElementById("pesan_status").innerText = "BENAR! (+100 PTS)";
        } else {
            document.getElementById("pesan_status").innerText = "SALAH! (Jawaban Benar: " + detBenar + ")";
        }
        lanjutLevel();
    }

    function lanjutLevel() {
        if (level < 3) {
            level++;
            setTimeout(buatSoal, 1200);
        } else {
            clearInterval(timerInterval);
            document.getElementById("pesan_status").innerText = "GAME SELESAI! Skor Akhir: " + skor;
        }
    }

    buatSoal();
</script>
</body>
</html>
