<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>X-Terminator - SPLTV Elimination</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #34495e; padding: 25px; border-radius: 10px; width: 440px; text-align: center; border: 2px solid #e74c3c; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; background: #1a252f; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .equation-box { font-size: 16px; margin: 15px 0; text-align: left; background: #2c3e50; padding: 15px; border-radius: 8px; }
        .input-k { width: 45px; padding: 5px; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #e74c3c; color: white; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; }
        #pesan_status { margin-top: 15px; color: #f1c40f; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>X-TERMINATOR</h2>
    <div class="stats">
        <div>LEVEL: <span id="level1">1</span></div>
        <div>SKOR: <span id="skor1">0</span></div>
        <div>WAKTU: <span id="waktu1">20</span>s</div>
    </div>

    <div class="equation-box">
        <p>P1: (<span id="a1"></span>)x + (<span id="b1"></span>)y + (<span id="c1"></span>)z = <span id="d1"></span> | &times; <input type="number" id="k1" class="input-k"></p>
        <p>P2: (<span id="a2"></span>)x + (<span id="b2"></span>)y + (<span id="c2"></span>)z = <span id="d2"></span> | &times; <input type="number" id="k2" class="input-k"></p>
    </div>

    <button onclick="cekEliminasi()">ENTER (ELIMINASI X)</button>
    <div id="pesan_status"></div>
</div>

<script>
    let skor1 = 0, level1 = 1, waktu1 = 20, timerInterval;
    let a1, b1, c1, d1, a2, b2, c2, d2;

    function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function buatSoal() {
        clearInterval(timerInterval);
        waktu1 = 20;
        document.getElementById("waktu1").innerText = waktu1;
        document.getElementById("k1").value = ""; document.getElementById("k2").value = "";

        if (level1 === 1) { a1 = 1; a2 = randomInt(2, 4); }
        else if (level1 === 2) { a1 = 2; a2 = randomInt(3, 5); }
        else { a1 = randomInt(3, 5); a2 = randomInt(2, 4); }

        b1 = randomInt(1, 3); c1 = randomInt(1, 3); d1 = randomInt(1, 5) * 2;
        b2 = randomInt(1, 3); c2 = randomInt(1, 3); d2 = randomInt(1, 5) * 3;

        document.getElementById("a1").innerText = a1; document.getElementById("b1").innerText = b1;
        document.getElementById("c1").innerText = c1; document.getElementById("d1").innerText = d1;
        document.getElementById("a2").innerText = a2; document.getElementById("b2").innerText = b2;
        document.getElementById("c2").innerText = c2; document.getElementById("d2").innerText = d2;
        document.getElementById("level1").innerText = level1;

        timerInterval = setInterval(() => {
            waktu1--;
            document.getElementById("waktu1").innerText = waktu1;
            if (waktu1 <= 0) {
                clearInterval(timerInterval);
                document.getElementById("pesan_status").innerText = "TIME OUT!";
                lanjutLevel();
            }
        }, 1000);
    }

    function cekEliminasi() {
        let k1 = parseInt(document.getElementById("k1").value);
        let k2 = parseInt(document.getElementById("k2").value);

        if ((a1 * k1 === a2 * k2) && k1 > 0 && k2 > 0) {
            skor1 += 100;
            document.getElementById("skor1").innerText = skor1;
            document.getElementById("pesan_status").innerText = "TARGET ELIMINATED! (+100 PTS)";
        } else {
            document.getElementById("pesan_status").innerText = "ELIMINASI GAGAL! Koefisien x belum sama.";
        }
        lanjutLevel();
    }

    function lanjutLevel() {
        if (level1 < 3) { level1++; setTimeout(buatSoal, 1200); }
        else { clearInterval(timerInterval); document.getElementById("pesan_status").innerText = "MISI SELESAI! Skor Akhir: " + skor1; }
    }

    buatSoal();
</script>
</body>
</html>
