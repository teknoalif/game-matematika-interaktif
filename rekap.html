<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papan Rekap Nilai Live - Game Matematika Kak Alif</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: #38bdf8; font-size: 26px; font-weight: 800; margin-bottom: 6px; }
        .header p { color: #94a3b8; font-size: 14px; }
        
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; }
        .status-text { font-size: 13px; color: #cbd5e1; }
        .live-badge { background: #22c55e; color: #022c22; font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; display: inline-flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; background: #022c22; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Table Styling */
        .table-responsive { overflow-x: auto; background: #1e293b; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #0f172a; color: #38bdf8; padding: 14px 16px; font-weight: bold; border-bottom: 2px solid #334155; }
        td { padding: 12px 16px; border-bottom: 1px solid #334155; color: #cbd5e1; }
        tr:hover { background: rgba(56, 189, 248, 0.05); }
        
        .badge-skor { background: #0284c7; color: white; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 13px; }
        .gelar-text { font-weight: bold; color: #22c55e; }
        .btn-home { display: inline-block; margin-top: 20px; color: #38bdf8; text-decoration: none; font-size: 14px; font-weight: bold; }
        .btn-home:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 LIVE LEADERBOARD & REKAP NILAI</h1>
        <p>Hasil Pengerjaan Game Matematika Interaktif Peserta Workshop FMIPA UNM</p>
    </div>

    <div class="status-bar">
        <div class="status-text">Total Peserta Terdata: <b id="total_peserta" style="color: #38bdf8;">0</b> Orang</div>
        <div class="live-badge"><span class="dot"></span> Auto Refresh (5s)</div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nama Pemain</th>
                    <th>Tingkat / Peran</th>
                    <th>Instansi / Sekolah</th>
                    <th>Game / Mode</th>
                    <th>Skor</th>
                    <th>Gelar Digital</th>
                </tr>
            </thead>
            <tbody id="tabel_body">
                <tr>
                    <td colspan="7" style="text-align: center; color: #94a3b8; padding: 30px;">Memuat data rekap dari cloud...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div style="text-align: center;">
        <a href="index.html" class="btn-home">&larr; Kembali ke Portal Game</a>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzaxD_dz5Nyou5vVinpfofAcwyt6oGEBsR80Exi2K02UT5_Ng9xUJ1KnavbDWnFKjfE8Q/exec";

    function muatDataRekap() {
        fetch(GOOGLE_SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                let tbody = document.getElementById("tabel_body");
                document.getElementById("total_peserta").innerText = data.length;

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #94a3b8; padding: 30px;">Belum ada data pengerjaan game.</td></tr>`;
                    return;
                }

                // Urutkan data terbaru di paling atas (reverse)
                data.reverse();

                let html = "";
                data.forEach((item, index) => {
                    html += `
                        <tr>
                            <td><b>${index + 1}</b></td>
                            <td style="font-weight: bold; color: #f8fafc;">${item.nama}</td>
                            <td>${item.tingkat}</td>
                            <td>${item.instansi}</td>
                            <td>${item.gameMode}</td>
                            <td><span class="badge-skor">${item.skor} PTS</span></td>
                            <td class="gelar-text">${item.gelar}</td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            })
            .catch(err => {
                console.log("Gagal memuat rekap:", err);
            });
    }

    // Muat data saat halaman dibuka
    muatDataRekap();

    // Auto Refresh setiap 5 detik (5000 ms) secara otomatis!
    setInterval(muatDataRekap, 5000);
</script>
</body>
</html>
